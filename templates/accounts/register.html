{% extends "base.html" %}
{% load static %}
{% block title %}Create Account — Egalitarian Computers{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:480px;">
    <div class="auth-card__logo">
      <img src="{% static 'images/logo.png' %}" alt="Egalitarian Computers" onerror="this.style.display='none'">
      <div style="font-weight:700; font-size:1rem; color:var(--blue-700);">Egalitarian Computers</div>
    </div>

    <h2>Create Your Account</h2>
    <p class="auth-card__sub">Join 28,000+ learners from 150+ countries.</p>

    <form method="post" action="">
      {% csrf_token %}
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" name="first_name" class="form-input" placeholder="First name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" name="last_name" class="form-input" placeholder="Last name" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="Choose a username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" name="phone" class="form-input" placeholder="+234 800 000 0000">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password1" class="form-input" placeholder="Create a strong password" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="password2" class="form-input" placeholder="Repeat your password" required>
      </div>
      <button type="submit" class="btn btn--primary btn--full btn--lg" style="margin-top:4px;">Create Account</button>
    </form>

    <div class="auth-divider" style="margin-top:20px;">
      Already have an account? <a href="{% url 'login' %}">Log in</a>
    </div>
  </div>
</div>
{% endblock %}
